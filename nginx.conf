server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Basic MIME types
    include /etc/nginx/mime.types;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript;

    # Assets in _astro/ are hashed and can be cached forever
    location ~* ^/_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Common static files in public/
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=3600";
        access_log off;
    }

    # HTML files - always revalidate
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
