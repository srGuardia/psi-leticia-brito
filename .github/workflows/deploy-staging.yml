name: Deploy [Staging]

on:
  push:
    branches:
      - develop

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy project
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://psi-staging.leticiabritto.com
    steps:
      - name: Deploy to Coolify
        run: |
          curl --request GET '${{secrets.COOLIFY_WEBHOOK}}' --header 'Authorization: Bearer ${{secrets.COOLIFY_TOKEN}}'