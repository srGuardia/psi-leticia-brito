name: Deploy

on:
  push:
    tags:
      - "*"
    
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Hostinger
    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Deploy to Coolify
        run: |
          curl --request GET '${{secrets.COOLIFY_WEBHOOK}}' --header 'Authorization: Bearer ${{secrets.COOLIFY_TOKEN}}'