services:
  psi-leticia-brito:
    container_name: psi-leticia-brito
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "--quiet", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3